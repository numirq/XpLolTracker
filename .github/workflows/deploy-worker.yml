name: Deploy private backend

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Check deployment secrets
        shell: bash
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in repository Actions secrets."
            exit 1
          fi
      - name: Install dependencies
        run: npm ci
      - name: Run backend tests
        run: npm test
      - name: Prepare access database
        shell: bash
        run: |
          set -euo pipefail
          DATABASE_NAME="lol-xp-tracker-access"
          DATABASES="$(npx wrangler d1 list --json)"
          DATABASE_ID="$(node -e '
            const databases = JSON.parse(process.argv[1]);
            const match = databases.find((database) => database.name === process.argv[2]);
            process.stdout.write(match ? (match.uuid || match.id) : "");
          ' "$DATABASES" "$DATABASE_NAME")"
          if [ -z "$DATABASE_ID" ]; then
            npx wrangler d1 create "$DATABASE_NAME" --jurisdiction eu
            DATABASES="$(npx wrangler d1 list --json)"
            DATABASE_ID="$(node -e '
              const databases = JSON.parse(process.argv[1]);
              const match = databases.find((database) => database.name === process.argv[2]);
              process.stdout.write(match ? (match.uuid || match.id) : "");
            ' "$DATABASES" "$DATABASE_NAME")"
          fi
          if [ -z "$DATABASE_ID" ]; then
            echo "D1 database could not be created or found. Add D1 Edit to the Cloudflare API token."
            exit 1
          fi
          node - "$DATABASE_ID" <<'NODE'
          const fs = require("node:fs");
          const config = JSON.parse(fs.readFileSync("wrangler.jsonc", "utf8"));
          config.d1_databases = [{
            binding: "ACCESS_DB",
            database_name: "lol-xp-tracker-access",
            database_id: process.argv[2]
          }];
          fs.writeFileSync("wrangler.deploy.json", JSON.stringify(config, null, 2));
          NODE
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply ACCESS_DB --remote --config wrangler.deploy.json
      - name: Deploy Worker
        run: npx wrangler deploy --config wrangler.deploy.json
